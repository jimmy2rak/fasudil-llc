<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fasudil-LLC Analyzer — 盐酸法舒地尔缓释制剂分析系统</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <!-- ======== 登录页 ======== -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="20" fill="#0d7377" opacity="0.12"/>
          <path d="M24 8 L24 40 M8 24 L40 24" stroke="#0d7377" stroke-width="2" stroke-linecap="round"/>
          <circle cx="24" cy="24" r="8" fill="#1e3a5f" opacity="0.2" stroke="#1e3a5f" stroke-width="1"/>
          <circle cx="24" cy="24" r="3" fill="#0d7377"/>
        </svg>
      </div>
      <h1 class="login-title">Fasudil-LLC Analyzer</h1>
      <p class="login-subtitle">盐酸法舒地尔缓释制剂 · 数据分析系统</p>

      <div id="login-form-container" class="login-form-container">
        <!-- 由 js/ui.js 的 renderLoginForm() 动态渲染 -->
      </div>

      <div id="login-status" class="login-status" style="display:none">
        <div class="spinner"></div>
        <p id="login-status-msg">正在登录...</p>
      </div>
    </div>
  </div>

  <!-- ======== 主应用界面 ======== -->
  <div id="app-main" class="app-main" style="display:none">
    <!-- 顶部栏 -->
    <header class="app-header">
      <div class="header-brand">
        <svg width="20" height="20" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="3" fill="#0d7377"/>
        </svg>
        <span class="header-title">Fasudil-LLC Analyzer</span>
      </div>
      <div class="header-search">
        <input type="text" id="global-search" placeholder="搜索实验、文献、计算..." class="search-input">
      </div>
      <div class="header-actions">
        <button class="btn btn-icon" onclick="App.exportZip()" title="导出备份">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9h12M9 3v12M9 3l4 4M9 3l-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="btn btn-icon" onclick="App.showSettings()" title="设置">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.5 3.5l1.4 1.4M13.1 13.1l1.4 1.4M3.5 14.5l1.4-1.4M13.1 4.9l1.4-1.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
        <button class="btn btn-icon" onclick="App.logout()" title="退出登录" style="color:var(--color-danger)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 2.5h3a1.5 1.5 0 011.5 1.5v10a1.5 1.5 0 01-1.5 1.5h-3M5 5.5L2.5 9 5 12.5M2.5 9h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>

    <!-- 侧边栏 -->
    <nav class="app-sidebar">
      <ul class="sidebar-nav">
        <li class="nav-item active" data-page="dashboard" onclick="App.navigate('dashboard')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="10" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="10" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>首页总览</span>
        </li>
        <li class="nav-item" data-page="upload" onclick="App.navigate('upload')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2v10M5 6l4-4 4 4M2 14h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>上传分析</span>
        </li>
        <li class="nav-item" data-page="experiments" onclick="App.navigate('experiments')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 3h12v12H3zM6 6h6M6 9h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>实验记录</span>
        </li>
        <li class="nav-item" data-page="calculations" onclick="App.navigate('calculations')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 8h6M6 11h3M9 6v6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          <span>计算表</span>
        </li>
        <li class="nav-item" data-page="knowledge" onclick="App.navigate('knowledge')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 2.5h5a2 2 0 012 2v8a2 2 0 01-2 2H3M8 2.5h5a2 2 0 012 2v8a2 2 0 01-2 2H8" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M3 14.5v1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>知识库</span>
        </li>
        <li class="nav-item" data-page="prescription" onclick="App.navigate('prescription')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 9.5h8M5 12.5h6M5 15.5h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>处方管理</span>
        </li>
        <li class="nav-item" data-page="sample" onclick="App.navigate('sample')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M5 2h8a1 1 0 011 1v12a1 1 0 01-1 1H5a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/><path d="M7 5h4M7 8h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>样本管理</span>
        </li>
        <li class="nav-item" data-page="settings" onclick="App.navigate('settings')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.5 3.5l1.4 1.4M13.1 13.1l1.4 1.4M3.5 14.5l1.4-1.4M13.1 4.9l1.4-1.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          <span>设置</span>
        </li>
      </ul>
    </nav>

    <!-- 主内容区 -->
    <main id="app-content" class="app-content">
      <!-- 页面内容由 JS 动态渲染 -->
    </main>
  </div>

  <!-- 模态框容器 -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-container" class="modal-container">
      <!-- 模态框内容由 JS 动态渲染 -->
    </div>
  </div>

  <!-- Toast 容器 -->
  <div id="toast-container" class="toast-container"></div>

  <!-- 第三方库 -->
  <script src="libs/xlsx.full.min.js"></script>
  <script src="libs/chart.umd.js"></script>
  <script src="libs/pdf.min.js"></script>
  <script>if(typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'libs/pdf.worker.min.js';</script>
  <script src="libs/mammoth.min.js"></script>

  <!-- 应用 JS（按依赖顺序） -->
  <script src="js/fs-manager.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/ml.js"></script>
  <script src="js/experiment-cards-data.js"></script>
  <script src="js/experiment-cards.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
