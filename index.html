<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Fasudil-LLC Analyzer — 盐酸法舒地尔缓释制剂分析系统</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/app.css?v=2">
</head>
<body>
  <!-- ======== 登录页 ======== -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="20" fill="#0d7377" opacity="0.12"/>
          <path d="M24 8 L24 40 M8 24 L40 24" stroke="#0d7377" stroke-width="2" stroke-linecap="round"/>
          <circle cx="24" cy="24" r="8" fill="#1e3a5f" opacity="0.2" stroke="#1e3a5f" stroke-width="1"/>
          <circle cx="24" cy="24" r="3" fill="#0d7377"/>
        </svg>
      </div>
      <h1 class="login-title">Fasudil-LLC Analyzer</h1>
      <p class="login-subtitle">盐酸法舒地尔缓释制剂 · 数据分析系统</p>

      <div id="login-form-container" class="login-form-container">
        <!-- 由 js/ui.js 的 renderLoginForm() 动态渲染 -->
      </div>

      <div id="login-status" class="login-status" style="display:none">
        <div class="spinner"></div>
        <p id="login-status-msg">正在登录...</p>
      </div>
    </div>
  </div>

  <!-- ======== 主应用界面 ======== -->
  <div id="app-main" class="app-main" style="display:none">
    <!-- 顶部栏 -->
    <header class="app-header">
      <div class="header-brand">
        <svg width="20" height="20" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="3" fill="#0d7377"/>
        </svg>
        <span class="header-title">Fasudil-LLC Analyzer</span>
      </div>
      <div class="header-search">
        <input type="text" id="global-search" placeholder="搜索实验、文献、计算..." class="search-input">
      </div>
      <div class="header-actions">
        <button class="btn btn-icon" onclick="App.exportZip()" title="导出备份">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9h12M9 3v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 6l-3 3-3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="btn btn-icon" onclick="App.showSettings()" title="设置">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 11.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z" stroke="currentColor" stroke-width="1.3"/><path d="M14.95 11.5a1 1 0 00.2 1.1l.04.04a1.21 1.21 0 11-1.71 1.71l-.04-.04a1 1 0 00-1.1-.2 1 1 0 00-.6.92v.12a1.21 1.21 0 11-2.42 0v-.06a1 1 0 00-.66-.94 1 1 0 00-1.1.2l-.04.04a1.21 1.21 0 11-1.71-1.71l.04-.04a1 1 0 00.2-1.1 1 1 0 00-.92-.6h-.12a1.21 1.21 0 110-2.42h.06a1 1 0 00.94-.66 1 1 0 00-.2-1.1l-.04-.04a1.21 1.21 0 111.71-1.71l.04.04a1 1 0 001.1.2h.05a1 1 0 00.6-.92v-.12a1.21 1.21 0 112.42 0v.06a1 1 0 00.66.94 1 1 0 001.1-.2l.04-.04a1.21 1.21 0 111.71 1.71l-.04.04a1 1 0 00-.2 1.1v.05a1 1 0 00.92.6h.12a1.21 1.21 0 110 2.42h-.06a1 1 0 00-.94.66z" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
        <button class="btn btn-icon" onclick="App.logout()" title="退出登录" style="color:var(--color-danger)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 2.5H4.5A1.5 1.5 0 003 4v10a1.5 1.5 0 001.5 1.5H7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 5.5l3.5 3.5L11 12.5M14.5 9H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>

    <!-- 侧边栏 -->
    <nav class="app-sidebar">
      <ul class="sidebar-nav">
        <li class="nav-item active" data-page="dashboard" onclick="App.navigate('dashboard')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 9l7-7 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 7v7a1 1 0 001 1h2v-4a1 1 0 011-1h2a1 1 0 011 1v4h2a1 1 0 001-1V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>首页总览</span>
        </li>
        <li class="nav-item" data-page="upload" onclick="App.navigate('upload')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M9 3v8M6 7l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>上传分析</span>
        </li>
        <li class="nav-item" data-page="experiments" onclick="App.navigate('experiments')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 2.5h10a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1v-12a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/><path d="M6 6h6M6 9h4M6 12h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span>实验记录</span>
        </li>
        <li class="nav-item" data-page="tools" onclick="App.navigate('tools')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M8.5 4.5L2.5 12a1.5 1.5 0 102.12 2.12l7.5-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M15.1 8.9a3 3 0 10-4.24-4.24l-1.06 1.06 4.24 4.24 1.06-1.06z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>小工具</span>
        </li>
        <li class="nav-item" data-page="knowledge" onclick="App.navigate('knowledge')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 3.5h5a2 2 0 012 2v8a2 2 0 00-2-2H3v-8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M14 3.5H9a2 2 0 00-2 2v8a2 2 0 012 2h5a2 2 0 002-2v-8a2 2 0 00-2-2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          <span>知识库</span>
        </li>
        <li class="nav-item" data-page="prescription" onclick="App.navigate('prescription')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M5 2v14M13 2v14M3 5h12M3 9h12M3 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M5 6a3 3 0 013-3h2a3 3 0 013 3" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>处方管理</span>
        </li>
        <li class="nav-item" data-page="sample" onclick="App.navigate('sample')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M6 2a2 2 0 00-2 2v11a1 1 0 001 1h8a1 1 0 001-1V4a2 2 0 00-2-2H6z" stroke="currentColor" stroke-width="1.5"/><path d="M6 4h1M11 4h1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6 8h6M6 11h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span>样本管理</span>
        </li>
        <li class="nav-item" data-page="settings" onclick="App.navigate('settings')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 11.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z" stroke="currentColor" stroke-width="1.3"/><path d="M14.95 11.5a1 1 0 00.2 1.1l.04.04a1.21 1.21 0 11-1.71 1.71l-.04-.04a1 1 0 00-1.1-.2 1 1 0 00-.6.92v.12a1.21 1.21 0 11-2.42 0v-.06a1 1 0 00-.66-.94 1 1 0 00-1.1.2l-.04.04a1.21 1.21 0 11-1.71-1.71l.04-.04a1 1 0 00.2-1.1 1 1 0 00-.92-.6h-.12a1.21 1.21 0 110-2.42h.06a1 1 0 00.94-.66 1 1 0 00-.2-1.1l-.04-.04a1.21 1.21 0 111.71-1.71l.04.04a1 1 0 001.1.2h.05a1 1 0 00.6-.92v-.12a1.21 1.21 0 112.42 0v.06a1 1 0 00.66.94 1 1 0 001.1-.2l.04-.04a1.21 1.21 0 111.71 1.71l-.04.04a1 1 0 00-.2 1.1v.05a1 1 0 00.92.6h.12a1.21 1.21 0 110 2.42h-.06a1 1 0 00-.94.66z" stroke="currentColor" stroke-width="1.2"/></svg>
          <span>设置</span>
        </li>
      </ul>
    </nav>

    <!-- 主内容区 -->
    <main id="app-content" class="app-content">
      <!-- 页面内容由 JS 动态渲染 -->
    </main>
  </div>

  <!-- 模态框容器 -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-container" class="modal-container">
      <!-- 模态框内容由 JS 动态渲染 -->
    </div>
  </div>

  <!-- Toast 容器 -->
  <div id="toast-container" class="toast-container"></div>

  <!-- 第三方库 -->
  <script src="libs/xlsx.full.min.js?v=2"></script>
  <script src="libs/chart.umd.js?v=2"></script>
  <script src="libs/pdf.min.js?v=2"></script>
  <script>if(typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'libs/pdf.worker.min.js?v=2';</script>
  <script src="libs/mammoth.min.js?v=2"></script>

  <!-- 应用 JS（按依赖顺序） -->
  <script src="js/fs-manager.js?v=2"></script>
  <script src="js/parser.js?v=2"></script>
  <script src="js/ui.js?v=2"></script>
  <script src="js/charts.js?v=2"></script>
  <script src="js/calc.js?v=2"></script>
  <script src="js/ml.js?v=2"></script>
  <script src="js/experiment-cards-data.js?v=2"></script>
  <script src="js/experiment-cards.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
