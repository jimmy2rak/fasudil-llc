<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>处方表格计算测试</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:1200px;margin:0 auto;padding:20px;background:#f5f7fa}
  h1{font-size:18px;color:#1e3a5f;margin-bottom:4px}
  .sub{font-size:12px;color:#8c94a6;margin-bottom:20px}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
  th{background:#eef2f7;font-size:11px;padding:8px 4px;text-align:center;color:#5a6275;font-weight:600;border-bottom:2px solid #d8dce6;white-space:nowrap}
  th sub{font-size:10px;color:#8c94a6}
  td{padding:6px 2px;border-bottom:1px solid #e8ecf2;text-align:center}
  input{width:60px;padding:4px 6px;border:1px solid #d8dce6;border-radius:4px;font-size:12px;text-align:center;box-sizing:border-box}
  input:focus{border-color:#0d7377;outline:none}
  input.computed{background:#f0f4f8;border-color:#e0e4ea;color:#5a6275;cursor:default}
  input.computed:focus{border-color:#d8dce6}
  .result{font-size:12px;color:#0d7377;font-weight:600;padding:4px 8px}
  .pass{color:#27ae60;font-weight:700}
  .fail{color:#e74c3c;font-weight:700}
  .test-panel{background:#fff;border-radius:8px;padding:20px;margin-top:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
  .test-panel h3{font-size:14px;color:#1e3a5f;margin:0 0 12px 0}
  .test-row{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:8px}
  .test-item{font-size:12px;color:#5a6275}
  .test-item strong{color:#1a1a2e}
  .note{font-size:11px;color:#8c94a6;margin-top:8px;background:#f8fafc;padding:8px 12px;border-radius:4px;border-left:3px solid #0d7377}
  select{font-size:11px;padding:3px 4px;border:1px solid #d8dce6;border-radius:3px}
</style>
</head>
<body>

<h1>🧪 处方表格计算测试</h1>
<div class="sub">离线测试页面 — 无需数据库/验证码/后端</div>

<table id="form-table">
  <thead id="table-head"></thead>
  <tbody id="table-body"></tbody>
</table>

<div class="note">
  <strong>操作说明：</strong>修改任意输入框数值（白底），计算列（灰底）自动刷新。<br>
  填入 SPC=0.5, GMO=0.3, NMP=0.1, 水=0.05, EtOH=0.03, DOPG-Na=0.02, 本行加入药量=90, 密度=1.2, 取用体积=500<br>
  预期结果：本行总重=1.00g | 载药浓度=0.0688mg/ml | 实验药量=0.0344mg
</div>

<div class="test-panel" id="test-results">
  <h3>📋 自测结果</h3>
  <div id="test-output">等待填入数据后自动检测...</div>
</div>

<script>
// ========== 模板列定义（与内置默认模板完全一致） ==========
const BUILTIN_TEMPLATE = {
  id: '_builtin_default',
  name: '默认处方模板',
  columns: [
    { id:'formulationName', label:'处方名称',     type:'text',    width:'90px',  order:0, default:'' },
    { id:'spc',   label:'SPC',    type:'number', unit:'g',  width:'65px', order:1, default:0 },
    { id:'gmo',   label:'GMO',    type:'number', unit:'g',  width:'65px', order:2, default:0 },
    { id:'nmp',   label:'NMP',    type:'number', unit:'g',  width:'65px', order:3, default:0 },
    { id:'water', label:'水',      type:'number', unit:'g',  width:'55px', order:4, default:0 },
    { id:'etoh',  label:'EtOH',   type:'number', unit:'g',  width:'65px', order:5, default:0 },
    { id:'dopg',  label:'DOPG-Na',type:'number', unit:'g',  width:'75px', order:6, default:0 },
    { id:'rowTotal',  label:'本行总重', type:'computed', width:'65px', order:7,
      formula:'spc+gmo+nmp+water+etoh+dopg' },
    { id:'drugAmount', label:'本行加入药量', type:'number', unit:'mg', width:'85px', order:8, default:0 },
    { id:'density', label:'密度', type:'number', unit:'mg/ml', width:'70px', order:9, default:0 },
    { id:'drugConc',   label:'本行载药浓度', type:'dynamic', width:'95px', order:10,
      modes:[{ id:'manual', label:'手动输入' }, { id:'formula', label:'公式计算' }],
      defaultMode:'formula', defaultFormula:'drugAmount/(rowTotal*1000+drugAmount)/density' },
    { id:'takeVolume', label:'取用体积', type:'number', unit:'μL', width:'70px', order:11, default:0 },
    { id:'expDrugAmount', label:'实验药量', type:'computed', width:'75px', order:12,
      formula:'drugConc*takeVolume/1000' },
    { id:'samples', label:'对应样品', type:'text', width:'115px', order:13, default:'' },
  ]
};

let currentColumns = BUILTIN_TEMPLATE.columns;

// ========== 公式计算引擎 ==========
function _evaluateFormula(formula, tr) {
  if (!formula) return 0;
  try {
    let resolved = formula;
    resolved = resolved.replace(/([a-zA-Z_]\w*)/g, (match) => {
      if (/^\d+\.?\d*$/.test(match)) return match;
      if (['true','false','null','undefined','NaN','Infinity'].includes(match)) return match;
      if (/^[\d+\-*/()., ]+$/.test(match)) return match;
      const el = tr.querySelector(`[data-field="${match}"]`);
      if (el) {
        const val = parseFloat(el.value !== undefined ? el.value : el.textContent);
        return isNaN(val) ? '0' : String(val);
      }
      return '0';
    });
    const fn = new Function('return (' + resolved + ')');
    const result = fn();
    return isNaN(result) ? 0 : result;
  } catch {
    return 0;
  }
}

// ========== 三步计算 ==========
function onCellChange() {
  const tbody = document.getElementById('table-body');
  tbody.querySelectorAll('tr').forEach(tr => {
    // 第一步：本行总重
    tr.querySelectorAll('[data-formula]').forEach(el => {
      if (el.dataset.field === 'expDrugAmount') return;
      const formula = el.dataset.formula;
      if (formula) {
        const result = _evaluateFormula(formula, tr);
        el.value = result.toFixed(2);
      }
    });

    // 第二步：载药浓度
    const modeEl = tr.querySelector('[data-field="drugConc-mode"]');
    if (modeEl && modeEl.value === 'formula') {
      const concInput = tr.querySelector('[data-field="drugConc"]');
      const formulaEl = tr.querySelector('[data-field="drugConc-formula"]');
      if (concInput && formulaEl) {
        const formula = formulaEl.textContent.trim();
        if (formula && formula !== '公式待配置') {
          const result = _evaluateFormula(formula, tr);
          concInput.value = result.toFixed(4);
        }
      }
    }

    // 第三步：实验药量
    const expEl = tr.querySelector('[data-field="expDrugAmount"]');
    if (expEl && expEl.dataset.formula) {
      const result = _evaluateFormula(expEl.dataset.formula, tr);
      expEl.value = result.toFixed(4);
    }

    // NaN容错
    tr.querySelectorAll('[data-formula]').forEach(el => {
      const val = parseFloat(el.value);
      if (isNaN(val)) el.value = '0.00';
    });
  });

  runTests();
}

// ========== 渲染表头 ==========
function renderTableHead() {
  let html = '<tr>';
  currentColumns.forEach(col => {
    let label = col.label;
    if (col.unit && (col.type === 'number' || col.type === 'computed')) {
      label += `<sub>(${col.unit})</sub>`;
    }
    html += `<th style="width:${col.width}">${label}</th>`;
  });
  html += '</tr>';
  document.getElementById('table-head').innerHTML = html;
}

// ========== 渲染行 ==========
function renderFormRow() {
  let html = '<tr>';
  currentColumns.forEach(col => {
    switch(col.type) {
      case 'text':
        html += `<td><input data-field="${col.id}" value="" placeholder="${col.default||''}" style="width:70px"></td>`;
        break;
      case 'number':
        html += `<td><input data-field="${col.id}" type="number" step="any"
          value="0.00" oninput="onCellChange()"></td>`;
        break;
      case 'computed':
        html += `<td><input class="computed" data-field="${col.id}" data-formula="${col.formula||''}"
          value="0.00" readonly tabindex="-1" style="background:#f0f4f8;cursor:default"></td>`;
        break;
      case 'dynamic':
        html += `<td><div style="display:flex;gap:2px;align-items:center;justify-content:center">
          <select data-field="${col.id}-mode" onchange="onModeChange(this)">
            ${(col.modes||[]).map(m =>
              `<option value="${m.id}" ${m.id===col.defaultMode?'selected':''}>${m.label}</option>`
            ).join('')}
          </select>
          <input data-field="${col.id}" type="number" step="any" value="0.0000"
            oninput="onCellChange()"
            style="${col.defaultMode==='formula'?'display:none':''};width:50px">
          <span data-field="${col.id}-formula"
            style="${col.defaultMode==='formula'?'':'display:none'};font-size:9px;color:#8c94a6">
            ${col.defaultFormula || '公式待配置'}
          </span>
        </div></td>`;
        break;
    }
  });
  html += '</tr>';
  document.getElementById('table-body').innerHTML = html;
}

function onModeChange(select) {
  const tr = select.closest('tr');
  const mode = select.value;
  const input = tr.querySelector('[data-field="drugConc"]');
  const text = tr.querySelector('[data-field="drugConc-formula"]');
  if (input) input.style.display = mode === 'formula' ? 'none' : '';
  if (text) text.style.display = mode === 'formula' ? '' : 'none';
  if (mode === 'formula') onCellChange();
}

// ========== 自测脚本 ==========
function runTests() {
  const results = [];
  const tr = document.querySelector('#table-body tr');
  if (!tr) return;
  
  const getVal = (field) => {
    const el = tr.querySelector(`[data-field="${field}"]`);
    if (!el) return NaN;
    return parseFloat(el.value !== undefined ? el.value : el.textContent);
  };

  const rowTotal = getVal('rowTotal');
  const drugConc = getVal('drugConc');
  const expDrug = getVal('expDrugAmount');
  
  // 只在有数据时测试
  const drugAmt = getVal('drugAmount');
  if (isNaN(drugAmt) || drugAmt === 0) {
    document.getElementById('test-output').innerHTML = '<span style="color:#8c94a6">⏳ 填入数值后自动检测...</span>';
    return;
  }

  const totalOk = !isNaN(rowTotal);
  let concOk = false, expOk = false;
  
  if (!isNaN(drugConc) && drugConc > 0) {
    concOk = Math.abs(drugConc - (drugAmt / (rowTotal*1000 + drugAmt) / getVal('density'))) < 0.0001;
  }
  if (!isNaN(expDrug) && expDrug > 0) {
    expOk = Math.abs(expDrug - (drugConc * getVal('takeVolume') / 1000)) < 0.0001;
  }

  document.getElementById('test-output').innerHTML = `
    <div class="test-row">
      <div class="test-item">本行总重: <strong>${isNaN(rowTotal) ? '—' : rowTotal.toFixed(2)} g</strong></div>
      <div class="test-item">载药浓度: <strong>${isNaN(drugConc) ? '—' : drugConc.toFixed(4)} mg/ml</strong></div>
      <div class="test-item">实验药量: <strong>${isNaN(expDrug) ? '—' : expDrug.toFixed(4)} mg</strong></div>
    </div>
    <div class="test-row" style="margin-top:4px">
      <div class="test-item">总重计算: <span class="${!isNaN(rowTotal) && rowTotal > 0 ? 'pass' : 'fail'}">${!isNaN(rowTotal) && rowTotal > 0 ? '✅' : '⏳'}</span></div>
      <div class="test-item">载药浓度公式: <span class="${concOk ? 'pass' : 'fail'}">${concOk ? '✅' : (drugConc > 0 ? '❌' : '⏳')}</span></div>
      <div class="test-item">实验药量公式: <span class="${expOk ? 'pass' : 'fail'}">${expOk ? '✅' : (expDrug > 0 ? '❌' : '⏳')}</span></div>
    </div>
  `;
}

// ========== 预填测试数据 ==========
function fillTestData() {
  const preset = { spc:0.5, gmo:0.3, nmp:0.1, water:0.05, etoh:0.03, dopg:0.02, drugAmount:90, density:1.2, takeVolume:500 };
  const tr = document.querySelector('#table-body tr');
  Object.entries(preset).forEach(([k,v]) => {
    const el = tr.querySelector(`[data-field="${k}"]`);
    if (el) { el.value = String(v); }
  });
  onCellChange();
}

// ========== 初始化 ==========
renderTableHead();
renderFormRow();
document.querySelector('#table-body tr').innerHTML += '<td style="padding:6px"><button onclick="fillTestData()" style="padding:4px 12px;font-size:11px;cursor:pointer">填入测试数据</button></td>';

document.getElementById('test-output').innerHTML = '<span style="color:#8c94a6">点击「填入测试数据」按钮验证计算...</span>';
</script>
</body>
</html>
